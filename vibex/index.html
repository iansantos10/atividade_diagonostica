<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VibeX</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="icon" type="image/png" href="img/icon_vibex.png">
    <meta name="theme-color" content="#2563eb">
    <script src="js/script.js"></script>
</head>
<body>
    <body>
  <div class="layout">
    <nav class="navbar">
      <button class="nav-btn active" title="Início">🏠</button>
      <button class="nav-btn" title="Pesquisa">🔎</button>
      <button class="nav-btn" title="Nova Postagem">➕</button>
      <button class="nav-btn" title="Perfil">👤</button>
    </nav>
    <div class="container">
        <header class="perfil">
            <img src="img/ian.png" alt="Foto do usuário" class="foto-perfil">
            
            <div class="info-usuario">
                <label class="nome">Ian de Souza Santos</label>
                <label class="usuario">@iangol10</label>
            </div>

            <button class="btn-editar">Editar Perfil</button>
        </header>
        <section class="nova-postagem">
            <form>
                <input type="text" placeholder="Quais são as novidades?">
                <button type="submit">Postar</button>
            </form>
        </section>
        <section class="postagens">
            <div class="post">
                <div class="post-header">
                    <img src="img/laura.png" class="foto-perfil-post">
                    <div>
                        <label class="nome">Maria Laura</label>
                        <label class="usuario">@tilaura</label>
                    </div>
                </div>

                <label class="conteudo">
                    Hoje foi um ótimo dia para estudar programação!
                </label>

                <div class="interacoes">
                    <button>❤️</button>
                    <label>14 curtidas</label>

                    <button>💬</button>
                    <label>3 comentários</label>
                </div>
            </div>
            <div class="post">
                <div class="post-header">
                    <img src="img/cr7.png" class="foto-perfil-post">
                    <div>
                        <label class="nome">Cristiano Ronaldo</label>
                        <label class="usuario">@cr7</label>
                    </div>
                </div>

                <label class="conteudo">
                    Fiz muitos gols no time do AL Hilal hoje!!!!!
                </label>

                <div class="interacoes">
                    <button>❤️</button>
                    <label>9 curtidas</label>

                    <button>💬</button>
                    <label>1 comentário</label>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
